version: "3"
services:
  postgres:
    image: postgres:13
    container_name: postgresql
    networks:
      - gphotos
    ports:
      - 5433:5432
    environment:
      POSTGRES_USER: ${POSTGRES_ROOT_USER}
      POSTGRES_PASSWORD: ${POSGRES_ROOT_PWD}
      VERBOSE: 1
  keycloak:
    image: jboss/keycloak:12.0.4
    container_name: keycloak
    depends_on:
      - postgres
    networks:
      - gphotos
    ports:
      - ${KEYCLOAK_PORT}: 8080
    volumes:
      - ${KEYCLOAK_REALM_FILE}: "/tmp/gophotos-realm.json"
    environment:
      KEYCLOAK_USER: ${KEYCLOAK_USER}
      KEYCLOAK_PASSWORD: ${KEYCLOAK_PASSWORD}
	  KEYCLOAK_IMPORT: "/tmp/gophoto-realm.json" 
	  DB_VENDOR: "postgres"
	  DB_ADDR: postgresql
	  DB_PORT: 5432
	  DB_DATABASE: "keycloak"
	  DB_USER: $(KEYCLOAK_DB_USER)
	  DB_PASSWORD: $(KEYCLOAK_DB_PWD)

networks:
  gphotos:
